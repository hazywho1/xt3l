name: XT 3L Price Alert Bot

on:
  schedule:
    - cron: "*/15 * * * *"    # runs every 15 minutes
  workflow_dispatch:         # lets you manually trigger a run from GitHub's UI for testing

permissions:
  contents: write           # needed so the workflow can commit the updated state file back

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ccxt requests

      - name: Run price check
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python check_3l_prices.py

      - name: Commit updated alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerted_state.json
          git diff --staged --quiet || git commit -m "Update alert state"
          git push
